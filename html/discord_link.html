<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Connect | Ajout Rapide</title>
    <link href="https://fonts.googleapis.com/css2?family=Ginto:wght@500;700&family=gg+sans:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --discord-blurple: #5865F2;
            --discord-green: #23a559;
            --discord-dark: #313338;
            --discord-card: #1e1f22;
            --text-main: #dbdee1;
            --white: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'gg sans', 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--discord-dark);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Container de la carte */
        .profile-card {
            background-color: var(--discord-card);
            width: 340px;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            position: relative;
        }

        /* Bannière supérieure */
        .banner {
            height: 60px;
            background-color: #6453ce;
        }

        /* Section Infos */
        .content {
            padding: 16px;
            padding-top: 45px;
            position: relative;
        }

        .avatar-container {
            position: absolute;
            top: -45px;
            left: 16px;
            background-color: var(--discord-card);
            padding: 6px;
            border-radius: 50%;
        }

        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-color: #5865f2;
            display: block;
        }

        .username {
            font-size: 20px;
            font-weight: 700;
            color: var(--white);
            margin-bottom: 4px;
        }

        .tag {
            font-size: 14px;
            color: #b5bac1;
            margin-bottom: 20px;
        }

        /* Boutons d'action */
        .actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn {
            border: none;
            border-radius: 3px;
            padding: 10px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s;
            text-decoration: none;
            text-align: center;
        }

        .btn-primary {
            background-color: var(--discord-blurple);
            color: var(--white);
        }

        .btn-secondary {
            background-color: #4e5058;
            color: var(--white);
        }

        .btn:hover {
            opacity: 0.8;
        }

        /* Notification de succès */
        #toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: var(--discord-green);
            color: white;
            padding: 12px 24px;
            border-radius: 4px;
            font-weight: bold;
            display: none;
            z-index: 100;
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <div class="banner"></div>
        <div class="content">
            <div class="avatar-container">
                <img src="./logo.png" alt="Avatar" class="avatar">
            </div>
            
            <div class="username">DAHORD</div>
            <div class="tag">@dahordklh08</div>

            <div class="actions">
                <a href="discord://-/users/964984937059082400" class="btn btn-primary" id="directLink">
                    Ouvrir dans Discord
                </a>

                <button class="btn btn-secondary" onclick="copyUser('dahordklh08')">
                    Copier le nom d'utilisateur
                </button>
                
            </div>
        </div>
    </div>

    <div id="toast" >Copié dans le presse-papier !</div>

    <script>
        /**
         * Copie le texte dans le presse-papier et affiche une notification
         * @param {string} text - Le pseudo à copier
         */
        function copyUser(text) {
            navigator.clipboard.writeText(text).then(() => {
                const toast = document.getElementById('toast');
                toast.style.display = 'block';
                
                setTimeout(() => {
                    toast.style.display = 'none';
                }, 2500);
            }).catch(err => {
                console.error("Erreur de copie : ", err);
            });
        }

        /**
         * Fallback : Si l'application Discord n'est pas installée, 
         * redirige vers la page web du profil après un court délai.
         */
        document.getElementById('directLink').addEventListener('click', function(e) {
            const userId = "964984937059082400"; 
            setTimeout(() => {
                // Si la page est toujours active après 1.5s, on tente le lien web
                if (!document.hidden) {
                    window.open(`https://discord.com/users/${userId}`, '_blank');
                }
            }, 1500);
        });
    </script>
</body>
</html>
